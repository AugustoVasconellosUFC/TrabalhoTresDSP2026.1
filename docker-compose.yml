services:
  # Serviço 1: Base de Dados NoSQL
  mongo:
    image: mongo:latest
    container_name: dsp_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - dsp_network

  # Serviço 2: Armazenamento de Objetos (Ficheiros)
  minio:
    image: minio/minio:latest
    container_name: dsp_minio
    ports:
      - "${MINIO_PORT:-9000}:9000"       # Porta da API do MinIO
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Porta da Consola Web
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - dsp_network

  # Serviço 3: Backend FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsp_api
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - minio
    env_file:
      - .env
    networks:
      - dsp_network

volumes:
  mongo_data: # Persistência da base de dados MongoDB
  minio_data: # Persistência dos ficheiros físicos do MinIO

networks:
  dsp_network:
    driver: bridge